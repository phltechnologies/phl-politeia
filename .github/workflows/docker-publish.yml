name: PHL — Docker Build & Publish

on:
  push:
    tags:
      - 'phl/v*'
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/phltechnologies

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name and tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},prefix=phl-,value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},prefix=phl-,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=sha-

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "file=Dockerfile" >> $GITHUB_OUTPUT
          elif [ -f "contrib/docker/Dockerfile" ]; then
            echo "file=contrib/docker/Dockerfile" >> $GITHUB_OUTPUT
          else
            # Generate a minimal Dockerfile for Go repos
            REPO_NAME=$(basename "${{ github.repository }}" | sed 's/phl-//')
            cat > Dockerfile.phl << EOF
          FROM golang:1.22-alpine AS builder
          WORKDIR /build
          COPY go.mod go.sum ./
          RUN go mod download
          COPY . .
          RUN CGO_ENABLED=0 go build -ldflags="-s -w" -o /app ./cmd/${REPO_NAME} 2>/dev/null || \
              CGO_ENABLED=0 go build -ldflags="-s -w" -o /app . 2>/dev/null || \
              CGO_ENABLED=0 go build -ldflags="-s -w" -o /app \$(find cmd -name main.go | head -1 | xargs dirname | sed 's|^|./|')

          FROM alpine:3.19
          RUN apk add --no-cache ca-certificates tzdata
          COPY --from=builder /app /usr/local/bin/app
          EXPOSE 9108 9109
          ENTRYPOINT ["/usr/local/bin/app"]
          EOF
            echo "file=Dockerfile.phl" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Image summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_BASE }}/${{ github.event.repository.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`sh" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_BASE }}/${{ github.event.repository.name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
