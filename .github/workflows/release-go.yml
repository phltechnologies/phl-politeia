name: PHL — Release (Go)

on:
  push:
    tags:
      - 'phl/v*'   # e.g. phl/v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

env:
  GO_VERSION: '1.22'

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Determine repo name and version
        id: meta
        run: |
          REPO="${{ github.repository }}"
          NAME=$(basename "$REPO")
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#phl/}"   # strip phl/ prefix from tag
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "artifact=${NAME}-${VERSION}-${{ matrix.suffix }}${{ matrix.ext }}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          # Find the main package — usually cmd/{reponame} or root
          REPO_NAME=$(basename "${{ github.repository }}" | sed 's/phl-//')
          MAIN_PKG=""
          if [ -d "cmd/${REPO_NAME}" ]; then
            MAIN_PKG="./cmd/${REPO_NAME}"
          elif [ -f "main.go" ]; then
            MAIN_PKG="."
          else
            # Find first cmd subdirectory
            MAIN_PKG=$(find cmd -name "main.go" -maxdepth 2 | head -1 | xargs dirname | sed 's|^|./|')
          fi
          echo "Building $MAIN_PKG → ${{ steps.meta.outputs.artifact }}"
          go build -v \
            -ldflags="-s -w -X main.version=${{ steps.meta.outputs.version }}" \
            -o "${{ steps.meta.outputs.artifact }}" \
            ${MAIN_PKG}

      - name: Create checksum
        run: sha256sum "${{ steps.meta.outputs.artifact }}" > "${{ steps.meta.outputs.artifact }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: |
            ${{ steps.meta.outputs.artifact }}
            ${{ steps.meta.outputs.artifact }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Determine version
        id: meta
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#phl/}"
          REPO_NAME=$(basename "${{ github.repository }}")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          UPSTREAM=$(echo "$REPO_NAME" | sed 's/phl-//')
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          cat > release_notes.md << 'EOF'
          ## PHL Technologies — ${{ steps.meta.outputs.repo_name }} ${{ steps.meta.outputs.version }}

          Maintained fork of [`decred/${{ steps.meta.outputs.upstream }}`](https://github.com/decred/${{ steps.meta.outputs.upstream }}) by [PHL Technologies](https://github.com/phltechnologies).

          ### What's in this release
          - Synced with upstream Decred codebase
          - Bug fixes and dependency updates applied by PHL maintenance pipeline
          - All changes reviewed and approved by a PHL maintainer

          ### Downloads
          Select the binary for your platform below. Verify the `.sha256` checksum before running.

          ### Upstream
          This is a maintained fork. For protocol-level changes, see the [upstream repo](https://github.com/decred/${{ steps.meta.outputs.upstream }}).

          ### Verification
          ```sh
          sha256sum -c <binary>.sha256
          ```

          _Released by PHL Technologies — github.com/phltechnologies_
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ steps.meta.outputs.repo_name }} ${{ steps.meta.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
